# ==============================================================================
# 🎨 THEME & APPEARANCE
# ==============================================================================
# Use a high-quality theme. This is "Catppuccin Mocha" style (very popular).
# You can comment these out to use your original colors.
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC
cursor                  #F5E0DC
cursor_text_color       #1E1E2E
url_color               #F5E0DC
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF
wayland_titlebar_color  system
macos_titlebar_color    system

# Tab Bar Colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Aesthetic Settings
background_opacity 0.9
window_padding_width 10
# Hide the window decoration (title bar) for a cleaner look
hide_window_decorations yes 

# ==============================================================================
# 🔡 FONTS
# ==============================================================================
# "JetBrainsMono Nerd Font" is highly recommended for coding (has icons & ligatures).
# If you don't have it, stick with "Roboto Mono" or install a Nerd Font.
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Enable ligatures (e.g., => turns into an arrow)
disable_ligatures never

# ==============================================================================
# 🖥️ WINDOW & TABS
# ==============================================================================
# "Powerline" style tabs for a modern look
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_edge        bottom

# Window Layout
enabled_layouts splits,stack
# Don't ask for confirmation when closing a window
confirm_os_window_close 0

# ==============================================================================
# 🖱️ MOUSE & CURSOR
# ==============================================================================
# Hide mouse immediately when typing (negative value)
mouse_hide_wait -1.0
# Copy text simply by selecting it with the mouse
copy_on_select yes

# Cursor style
cursor_shape block
cursor_blink_interval 0.5

# Click on URLs to open them
url_style curly
open_url_with default

# ==============================================================================
# ⚡ PERFORMANCE
# ==============================================================================
# 150 FPS for smoother scrolling (default is ~100)
repaint_delay 8
input_delay 3
sync_to_monitor yes

# Increase scrollback buffer size (10000 lines)
scrollback_lines 10000

# ==============================================================================
# ⌨️ KEYBINDINGS
# ==============================================================================
# Clipboard
map ctrl+c        copy_or_interrupt
map ctrl+v       paste_from_clipboard

# Window Management (Split like a pro)
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+w     close_window

# Window Navigation
map ctrl+left  neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up    neighboring_window up
map ctrl+down  neighboring_window down

# Tab Navigation
map shift+left  previous_tab
map shift+right next_tab

# Zoom in/out
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Reload config without restarting kitty
map ctrl+shift+f5 load_config_file
