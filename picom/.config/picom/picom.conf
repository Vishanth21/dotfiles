# Core Settings
backend = "glx";
vsync = true;
xrender-sync-fence = true;
use-damage = true;

# Transparency
active-opacity = 0.75;
inactive-opacity = 0.60;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Blur (Subtle frosted glass)
blur: {
    method = "dual_kawase";
    strength = 3;
    background = true;
    background-frame = true;
    background-fixed = true;
};

# Fading
fading = true;
fade-delta = 5;
fade-in-step = 0.04;
fade-out-step = 0.04;

# Rules for specific apps
opacity-rule = [
    "85:class_g = 'kitty' && focused",
    "70:class_g = 'kitty' && !focused",
    "85:class_g = 'Rofi'",
    "85:class_g = 'Polybar'",
    "75:class_g = 'Thunar'",
    "85:class_g = 'Code' && focused",
    "70:class_g = 'Code' && !focused",
    "100:class_g = 'zen'",
    "100:class_g = 'mpv'",
    "100:class_g = 'Stremio'"
    "100:class_g = 'steam'"
];

# Rounded Corners
corner-radius = 6;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'"
];

shadow = true;
shadow-radius = 18;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.55;

shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'slop'",
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'tooltip'"
];
